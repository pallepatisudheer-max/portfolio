<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudheer Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #f8fafc;
  --surface: #ffffff;
  --card: #ffffff;
  --border: #e2e8f0;
  --primary: #2563eb;
  --accent: #0ea5e9;
  --text: #1e293b;
  --muted: #64748b;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.6;
}

nav {
  display:flex;
  justify-content:space-between;
  padding:1rem 3rem;
  background:white;
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
}

nav h2 { color:var(--primary); }

nav a {
  margin-left:20px;
  text-decoration:none;
  color:var(--muted);
  font-weight:500;
}

nav a:hover { color:var(--primary); }

.hero {
  text-align:center;
  padding:100px 20px;
}

.hero h1 {
  font-size:2.8rem;
  color:var(--primary);
}

.hero p {
  color:var(--muted);
  margin:10px 0 20px;
}

.btn {
  padding:10px 20px;
  background:var(--primary);
  color:white;
  border-radius:6px;
  text-decoration:none;
  transition:0.3s;
}

.btn:hover {
  background:#1d4ed8;
  transform:translateY(-2px);
}

section { padding:60px 10%; }

h2 { margin-bottom:20px; }

.card {
  background:var(--card);
  padding:20px;
  border-radius:10px;
  border:1px solid var(--border);
  margin-top:15px;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-4px);
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

footer {
  text-align:center;
  padding:20px;
  color:var(--muted);
}
